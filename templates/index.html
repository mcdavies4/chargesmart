<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChargeSmart — EV Predictor</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --green: #00ff87;
            --dark: #0a0a0f;
            --card: #12121a;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --muted: #6b6b80;
            --red: #ff5050;
        }
        body { background: var(--dark); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .grid-bg {
            position: fixed; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.3; z-index: 0;
        }
        .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        header { margin-bottom: 50px; animation: fadeUp 0.8s ease forwards; }
        .logo { font-size: 13px; font-family: 'Space Mono', monospace; color: var(--green); letter-spacing: 4px; text-transform: uppercase; }
        h1 { font-size: clamp(40px, 8vw, 72px); font-weight: 800; line-height: 1; letter-spacing: -2px; margin-top: 16px; }
        h1 span { color: var(--green); }
        .subtitle { margin-top: 16px; color: var(--muted); font-size: 16px; font-family: 'Space Mono', monospace; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin-bottom: 24px; animation: fadeUp 0.8s ease forwards; }
        .card-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--green); font-family: 'Space Mono', monospace; margin-bottom: 24px; }
        .location-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; margin-bottom: 20px; align-items: end; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-family: 'Space Mono', monospace; }
        input, select { background: var(--dark); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 14px; transition: border-color 0.2s; width: 100%; }
        input:focus, select:focus { outline: none; border-color: var(--green); }
        select option { background: var(--dark); }
        .gps-btn { padding: 12px 16px; background: transparent; border: 1px solid var(--green); border-radius: 8px; color: var(--green); font-family: 'Space Mono', monospace; font-size: 13px; cursor: pointer; white-space: nowrap; transition: all 0.2s; height: 46px; }
        .gps-btn:hover { background: rgba(0,255,135,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .predict-btn { width: 100%; padding: 16px; background: var(--green); color: var(--dark); border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .predict-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0, 255, 135, 0.3); }
        .predict-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .results-count { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--muted); }
        .charger-list { display: flex; flex-direction: column; gap: 12px; }
        .charger-item { background: var(--dark); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center; animation: fadeUp 0.4s ease forwards; }
        .charger-item.free { border-left: 3px solid var(--green); }
        .charger-item.busy { border-left: 3px solid var(--red); }
        .charger-dot { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .charger-dot.free { background: rgba(0,255,135,0.1); border: 1px solid var(--green); }
        .charger-dot.busy { background: rgba(255,80,80,0.1); border: 1px solid var(--red); }
        .charger-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .charger-meta { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 8px; }
        .directions-btn { display: inline-block; padding: 6px 12px; background: transparent; border: 1px solid var(--green); border-radius: 6px; color: var(--green); font-family: 'Space Mono', monospace; font-size: 11px; text-decoration: none; letter-spacing: 1px; transition: background 0.2s; }
        .directions-btn:hover { background: rgba(0,255,135,0.1); }
        .charger-prediction { text-align: right; }
        .pred-label { font-size: 13px; font-weight: 700; letter-spacing: 1px; }
        .pred-label.free { color: var(--green); }
        .pred-label.busy { color: var(--red); }
        .pred-pct { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }
        .empty-state { text-align: center; padding: 40px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 13px; }
        .status-bar { display: none; padding: 12px 16px; background: rgba(0,255,135,0.05); border: 1px solid rgba(0,255,135,0.2); border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--green); margin-bottom: 16px; }
        .status-bar.visible { display: block; }
        .fleet-toggle-btn { padding: 8px 16px; background: transparent; border: 1px solid var(--muted); border-radius: 20px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 11px; cursor: pointer; letter-spacing: 2px; transition: all 0.3s; }
        .fleet-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .fleet-stat { background: var(--dark); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
        .fleet-stat-number { font-size: 32px; font-weight: 800; color: var(--green); }
        .fleet-stat-number.red { color: var(--red); }
        .fleet-stat-label { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 4px; }
        .add-vehicle-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; margin-bottom: 24px; }
        .add-vehicle-btn { padding: 12px 20px; background: var(--green); color: var(--dark); border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 800; cursor: pointer; font-size: 13px; white-space: nowrap; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .charger-item { grid-template-columns: auto 1fr; }
            .charger-prediction { display: none; }
            .fleet-stats { grid-template-columns: 1fr; }
            .add-vehicle-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="container">
        <header>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div class="logo">⚡ ChargeSmart UK</div>
                <button id="fleet-toggle" class="fleet-toggle-btn" onclick="toggleFleetMode()">FLEET MODE</button>
            </div>
            <h1>Find a <span>free</span><br>charger near you</h1>
            <p class="subtitle">// AI predictions for UK EV chargers</p>
        </header>

        <!-- CONSUMER SECTION -->
        <div id="consumer-section">
            <div class="card">
                <div class="card-title">// Your location</div>
                <div class="location-row">
                    <div class="form-group">
                        <label>Postcode</label>
                        <input type="text" id="postcode" placeholder="e.g. SW1A 1AA" maxlength="8">
                    </div>
                    <button class="gps-btn" onclick="useMyLocation()">📍 Use my location</button>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Arrival Time</label>
                        <select id="hour">
                            <option value="6">6:00 AM</option>
                            <option value="7">7:00 AM</option>
                            <option value="8" selected>8:00 AM — Rush hour</option>
                            <option value="9">9:00 AM</option>
                            <option value="10">10:00 AM</option>
                            <option value="11">11:00 AM</option>
                            <option value="12">12:00 PM — Lunchtime</option>
                            <option value="13">1:00 PM</option>
                            <option value="14">2:00 PM</option>
                            <option value="15">3:00 PM</option>
                            <option value="16">4:00 PM</option>
                            <option value="17">5:00 PM — Rush hour</option>
                            <option value="18">6:00 PM</option>
                            <option value="19">7:00 PM</option>
                            <option value="20">8:00 PM</option>
                            <option value="21">9:00 PM</option>
                            <option value="22">10:00 PM</option>
                            <option value="23">11:00 PM</option>
                            <option value="0">12:00 AM</option>
                            <option value="2">2:00 AM</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Day of Week</label>
                        <select id="day">
                            <option value="0">Monday</option>
                            <option value="1">Tuesday</option>
                            <option value="2">Wednesday</option>
                            <option value="3">Thursday</option>
                            <option value="4">Friday</option>
                            <option value="5">Saturday</option>
                            <option value="6">Sunday</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Search Radius</label>
                        <select id="radius">
                            <option value="0.5">0.5 miles</option>
                            <option value="1" selected>1 mile</option>
                            <option value="2">2 miles</option>
                            <option value="5">5 miles</option>
                        </select>
                    </div>
                </div>
                <div class="status-bar" id="status"></div>
                <button class="predict-btn" id="search-btn" onclick="search()">⚡ Find Chargers Near Me</button>
            </div>

            <div class="card" id="results-card" style="display:none">
                <div class="results-header">
                    <div class="card-title" style="margin-bottom:0">// Nearby chargers</div>
                    <div class="results-count" id="results-count"></div>
                </div>
                <div class="charger-list" id="charger-list"></div>
            </div>
        </div>

        <!-- FLEET SECTION -->
        <div id="fleet-section" style="display:none">
            <div class="card">
                <div class="card-title">// Fleet overview</div>
                <div class="fleet-stats">
                    <div class="fleet-stat">
                        <div class="fleet-stat-number" id="fleet-vehicle-count">0</div>
                        <div class="fleet-stat-label">VEHICLES</div>
                    </div>
                    <div class="fleet-stat">
                        <div class="fleet-stat-number" id="fleet-free-count">0</div>
                        <div class="fleet-stat-label">CHARGERS FREE</div>
                    </div>
                    <div class="fleet-stat">
                        <div class="fleet-stat-number red" id="fleet-busy-count">0</div>
                        <div class="fleet-stat-label">CHARGERS BUSY</div>
                    </div>
                </div>

                <div class="card-title">// Add vehicle</div>
                <div class="add-vehicle-grid">
                    <div class="form-group">
                        <label>Vehicle Name / Plate</label>
                        <input type="text" id="vehicle-name" placeholder="e.g. VAN-001 or EV23 ABC">
                    </div>
                    <div class="form-group">
                        <label>Base Postcode</label>
                        <input type="text" id="vehicle-postcode" placeholder="e.g. B1 1BB">
                    </div>
                    <div class="form-group">
                        <label>&nbsp;</label>
                        <button class="add-vehicle-btn" onclick="addVehicle()">+ ADD</button>
                    </div>
                </div>

                <div class="card-title">// Vehicle fleet</div>
                <div id="fleet-list">
                    <div class="empty-state">No vehicles added yet. Add your first vehicle above.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let userLat = null;
        let userLon = null;
        let fleetMode = false;
        let fleet = [];

        function toggleFleetMode() {
            fleetMode = !fleetMode;
            const btn = document.getElementById("fleet-toggle");
            const consumerSection = document.getElementById("consumer-section");
            const fleetSection = document.getElementById("fleet-section");
            if (fleetMode) {
                btn.style.borderColor = "var(--green)";
                btn.style.color = "var(--green)";
                btn.textContent = "✓ FLEET MODE";
                consumerSection.style.display = "none";
                fleetSection.style.display = "block";
            } else {
                btn.style.borderColor = "var(--muted)";
                btn.style.color = "var(--muted)";
                btn.textContent = "FLEET MODE";
                consumerSection.style.display = "block";
                fleetSection.style.display = "none";
            }
        }

        function useMyLocation() {
            const status = document.getElementById("status");
            status.textContent = "📍 Getting your location...";
            status.classList.add("visible");
            if (!navigator.geolocation) {
                status.textContent = "❌ Geolocation not supported by your browser";
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;
                    document.getElementById("postcode").value = "";
                    document.getElementById("postcode").placeholder = `📍 ${userLat.toFixed(4)}, ${userLon.toFixed(4)}`;
                    status.textContent = `✅ Location found — ${userLat.toFixed(4)}, ${userLon.toFixed(4)}`;
                },
                (err) => {
                    status.textContent = "❌ Could not get location. Try entering a postcode instead.";
                }
            );
        }

        async function search() {
            const postcode = document.getElementById("postcode").value.trim();
            const hour = document.getElementById("hour").value;
            const day = document.getElementById("day").value;
            const radius = document.getElementById("radius").value;
            const btn = document.getElementById("search-btn");
            const status = document.getElementById("status");

            if (!postcode && !userLat) {
                status.textContent = "⚠️ Please enter a postcode or use your location first";
                status.classList.add("visible");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Searching...";
            status.textContent = "🔍 Finding chargers and running AI predictions...";
            status.classList.add("visible");

            let url;
            if (userLat && !postcode) {
                url = `/nearby?lat=${userLat}&lon=${userLon}&hour=${hour}&day_of_week=${day}&radius=${radius}`;
            } else {
                url = `/nearby?postcode=${encodeURIComponent(postcode)}&hour=${hour}&day_of_week=${day}&radius=${radius}`;
            }

            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.error) {
                    status.textContent = `❌ ${data.error}`;
                    btn.disabled = false;
                    btn.textContent = "⚡ Find Chargers Near Me";
                    return;
                }
                displayResults(data, hour, day);
                status.textContent = `✅ Found ${data.total} chargers within ${radius} mile${radius > 1 ? 's' : ''}`;
            } catch(err) {
                status.textContent = "❌ Something went wrong. Please try again.";
            }

            btn.disabled = false;
            btn.textContent = "⚡ Find Chargers Near Me";
        }

        function displayResults(data, hour, day) {
            const card = document.getElementById("results-card");
            const list = document.getElementById("charger-list");
            const count = document.getElementById("results-count");
            const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
            const h = parseInt(hour);
            const timeStr = h === 0 ? "12:00 AM" : h < 12 ? `${h}:00 AM` : h === 12 ? "12:00 PM" : `${h-12}:00 PM`;

            count.textContent = `${data.total} found — ${days[day]} at ${timeStr}`;
            card.style.display = "block";

            if (data.total === 0) {
                list.innerHTML = `<div class="empty-state">No chargers found in this area.<br>Try increasing your search radius.</div>`;
                return;
            }

            list.innerHTML = data.chargers.map((c, i) => `
                <div class="charger-item ${c.prediction}" style="animation-delay: ${i * 0.05}s">
                    <div class="charger-dot ${c.prediction}">${c.prediction === 'free' ? '⚡' : '🔴'}</div>
                    <div class="charger-info">
                        <h3>${c.operator !== 'unknown' ? c.operator : 'Unknown Operator'}</h3>
                        <div class="charger-meta">📍 ${c.distance_miles} miles away &nbsp;|&nbsp; 🔋 ${c.capacity} bay${c.capacity > 1 ? 's' : ''}</div>
                        <a class="directions-btn" href="https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lon}" target="_blank">🗺 GET DIRECTIONS</a>
                    </div>
                    <div class="charger-prediction">
                        <div class="pred-label ${c.prediction}">${c.prediction === 'free' ? 'LIKELY FREE' : 'LIKELY BUSY'}</div>
                        <div class="pred-pct">${c.probability_free}% free</div>
                    </div>
                </div>
            `).join('');
        }

        function addVehicle() {
            const name = document.getElementById("vehicle-name").value.trim();
            const postcode = document.getElementById("vehicle-postcode").value.trim();
            if (!name || !postcode) {
                alert("Please enter both a vehicle name and postcode");
                return;
            }
            fleet.push({ name, postcode, status: "checking" });
            document.getElementById("vehicle-name").value = "";
            document.getElementById("vehicle-postcode").value = "";
            updateFleetDisplay();
            checkVehicleChargers(fleet.length - 1);
        }

        async function checkVehicleChargers(index) {
            const vehicle = fleet[index];
            const hour = new Date().getHours();
            const day = new Date().getDay();
            try {
                const response = await fetch(`/nearby?postcode=${encodeURIComponent(vehicle.postcode)}&hour=${hour}&day_of_week=${day}&radius=2`);
                const data = await response.json();
                if (data.error) {
                    fleet[index].status = "error";
                    fleet[index].message = "Postcode not found";
                } else {
                    const freeCount = data.chargers.filter(c => c.prediction === "free").length;
                    const busyCount = data.chargers.filter(c => c.prediction === "busy").length;
                    fleet[index].status = freeCount > 0 ? "free" : "busy";
                    fleet[index].freeCount = freeCount;
                    fleet[index].busyCount = busyCount;
                    fleet[index].chargers = data.chargers.slice(0, 3);
                }
            } catch(err) {
                fleet[index].status = "error";
                fleet[index].message = "Could not check chargers";
            }
            updateFleetDisplay();
        }

        function updateFleetDisplay() {
            const list = document.getElementById("fleet-list");
            const totalFree = fleet.filter(v => v.status === "free").length;
            const totalBusy = fleet.filter(v => v.status === "busy").length;
            document.getElementById("fleet-vehicle-count").textContent = fleet.length;
            document.getElementById("fleet-free-count").textContent = totalFree;
            document.getElementById("fleet-busy-count").textContent = totalBusy;

            if (fleet.length === 0) {
                list.innerHTML = `<div class="empty-state">No vehicles added yet. Add your first vehicle above.</div>`;
                return;
            }

            list.innerHTML = fleet.map((v, i) => `
                <div class="charger-item ${v.status === 'free' ? 'free' : 'busy'}" style="margin-bottom:12px;">
                    <div class="charger-dot ${v.status === 'free' ? 'free' : 'busy'}">🚐</div>
                    <div class="charger-info">
                        <h3>${v.name}</h3>
                        <div class="charger-meta">
                            📍 ${v.postcode} &nbsp;|&nbsp;
                            ${v.status === 'checking' ? '🔍 Checking chargers...' :
                              v.status === 'error' ? '❌ ' + v.message :
                              v.freeCount + ' free · ' + v.busyCount + ' busy within 2 miles'}
                        </div>
                        ${v.chargers ? v.chargers.map(c =>
                            '<div style="margin-top:6px;font-family:Space Mono,monospace;font-size:11px;color:' + (c.prediction === 'free' ? 'var(--green)' : 'var(--red)') + '">' +
                            (c.prediction === 'free' ? '⚡' : '🔴') + ' ' + (c.operator !== 'unknown' ? c.operator : 'Unknown') + ' — ' + c.distance_miles + 'mi — ' + c.probability_free + '% free' +
                            ' &nbsp;<a href="https://www.google.com/maps/dir/?api=1&destination=' + c.lat + ',' + c.lon + '" target="_blank" style="color:var(--green);font-size:10px;">🗺 directions</a></div>'
                        ).join('') : ''}
                    </div>
                    <div class="charger-prediction">
                        <div class="pred-label ${v.status === 'free' ? 'free' : 'busy'}">
                            ${v.status === 'checking' ? 'CHECKING' : v.status === 'free' ? 'CHARGERS FREE' : v.status === 'error' ? 'ERROR' : 'CHARGERS BUSY'}
                        </div>
                        <button onclick="fleet.splice(${i}, 1); updateFleetDisplay();" style="margin-top:8px;padding:4px 8px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;">REMOVE</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
